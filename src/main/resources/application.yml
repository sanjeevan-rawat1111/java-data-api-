server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: java-data-api
  
  datasource:
    url: jdbc:mysql://localhost:3307/mydatabase?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Aerospike Configuration
aerospike:
  hosts:
    - host: localhost
      port: 3004
  namespace: test
  set: users

# Logging Configuration
logging:
  level:
    com.example.datapi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
